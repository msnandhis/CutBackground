services:
  postgres:
    image: postgres:16-alpine
    container_name: cutbackground-postgres
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: cutbackground
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cutbackground"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cutbackground-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: cutbackground-minio
    restart: unless-stopped
    profiles: ["storage"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-create-bucket:
    image: minio/mc:latest
    profiles: ["storage"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/tool-uploads;
      /usr/bin/mc anonymous set download local/tool-uploads;
      exit 0;
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
